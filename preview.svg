<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D1117"/>
      <stop offset="100%" style="stop-color:#161B22"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#5B8AF0"/>
      <stop offset="100%" style="stop-color:#A855F7"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <g stroke="rgba(255,255,255,0.04)" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Radar chart sketch (decorative, right side) -->
  <g transform="translate(900, 315)" opacity="0.18">
    <!-- Grid circles -->
    <circle cx="0" cy="0" r="160" fill="none" stroke="#5B8AF0" stroke-width="1"/>
    <circle cx="0" cy="0" r="120" fill="none" stroke="#5B8AF0" stroke-width="1"/>
    <circle cx="0" cy="0" r="80" fill="none" stroke="#5B8AF0" stroke-width="1"/>
    <circle cx="0" cy="0" r="40" fill="none" stroke="#5B8AF0" stroke-width="1"/>
    <!-- Axes (11) -->
    <line x1="0" y1="0" x2="0" y2="-160" stroke="#5B8AF0" stroke-width="1"/>
    <line x1="0" y1="0" x2="91" y2="-129" stroke="#5B8AF0" stroke-width="1"/>
    <line x1="0" y1="0" x2="152" y2="-49" stroke="#5B8AF0" stroke-width="1"/>
    <line x1="0" y1="0" x2="152" y2="49" stroke="#5B8AF0" stroke-width="1"/>
    <line x1="0" y1="0" x2="91" y2="129" stroke="#5B8AF0" stroke-width="1"/>
    <line x1="0" y1="0" x2="0" y2="160" stroke="#5B8AF0" stroke-width="1"/>
    <line x1="0" y1="0" x2="-91" y2="129" stroke="#5B8AF0" stroke-width="1"/>
    <line x1="0" y1="0" x2="-152" y2="49" stroke="#5B8AF0" stroke-width="1"/>
    <line x1="0" y1="0" x2="-152" y2="-49" stroke="#5B8AF0" stroke-width="1"/>
    <line x1="0" y1="0" x2="-91" y2="-129" stroke="#5B8AF0" stroke-width="1"/>
    <line x1="0" y1="0" x2="-30" y2="-158" stroke="#5B8AF0" stroke-width="1"/>
    <!-- Sample profile polygon -->
    <polygon points="0,-128 73,-103 130,-42 121,39 64,103 0,96 -73,77 -121,39 -91,-29 -55,-77 -18,-126"
             fill="rgba(91,138,240,0.15)" stroke="#5B8AF0" stroke-width="2"/>
    <!-- Effective polygon -->
    <polygon points="0,-144 82,-116 144,-46 136,44 72,116 0,108 -82,87 -136,44 -102,-33 -62,-87 -20,-142"
             fill="rgba(251,191,36,0.08)" stroke="rgba(251,191,36,0.6)" stroke-width="1.5" stroke-dasharray="6,4"/>
  </g>

  <!-- Accent bar top -->
  <rect x="80" y="0" width="4" height="630" fill="url(#accent)" opacity="0.6"/>

  <!-- Eyebrow -->
  <text x="120" y="195" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700"
        letter-spacing="4" fill="#5B8AF0" opacity="0.9">SPORT-LEISTUNGSKURS · KOORDINATIONSLEHRE</text>

  <!-- Title -->
  <text x="116" y="290" font-family="Georgia, serif" font-size="72" font-weight="400"
        fill="#E6EDF3" letter-spacing="-2">KAR-Reglermodell</text>

  <!-- Subtitle -->
  <text x="120" y="350" font-family="Inter, system-ui, sans-serif" font-size="26"
        fill="#8B949E">Koordinations-Anforderungs-Regler · Neumaier et al. (2009)</text>

  <!-- Feature pills -->
  <rect x="120" y="395" width="200" height="36" rx="18" fill="rgba(91,138,240,0.15)" stroke="rgba(91,138,240,0.4)" stroke-width="1"/>
  <text x="220" y="418" font-family="Inter, system-ui, sans-serif" font-size="16" fill="#5B8AF0" text-anchor="middle">11 Dimensionen</text>

  <rect x="334" y="395" width="220" height="36" rx="18" fill="rgba(168,85,247,0.12)" stroke="rgba(168,85,247,0.35)" stroke-width="1"/>
  <text x="444" y="418" font-family="Inter, system-ui, sans-serif" font-size="16" fill="#A855F7" text-anchor="middle">Wechselwirkungen</text>

  <rect x="568" y="395" width="230" height="36" rx="18" fill="rgba(34,197,94,0.1)" stroke="rgba(34,197,94,0.3)" stroke-width="1"/>
  <text x="683" y="418" font-family="Inter, system-ui, sans-serif" font-size="16" fill="#22C55E" text-anchor="middle">Praxis-Theorie-Link</text>

  <!-- Footer -->
  <text x="120" y="570" font-family="Inter, system-ui, sans-serif" font-size="17"
        fill="#484F58">© 2026 Ralf Duwenbeck · V1.1 · kar-reglermodell.vercel.app</text>
</svg>
